apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-tinyllama
  namespace: ai-workloads
  labels:
    app: ollama
spec:
replicas: 1
  Selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command: ["/bin/bash", "-c"]
          args:
            - "ollama serve & sleep 10 && ollama pull tinyllama && wait -n"
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: model-cache
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: ollama-model-cache
